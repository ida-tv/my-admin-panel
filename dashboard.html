<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой кабинет - IDA TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007aff;
            --text-main: #1d1d1f;
            --text-secondary: #6e6e73;
            --bg-body: #f5f7f9;
            --white: #ffffff;
            --border-color: #d2d2d7;
            --success: #2e7d32;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-body); padding: 20px; display: flex; justify-content: center; color: var(--text-main); }
        .container { max-width: 600px; width: 100%; background: var(--white); padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        h2 { text-align: center; font-weight: 700; margin-bottom: 25px; }
        
        .global-notice { display: none; background: #fff9c4; border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid #ffe58f; }

        .status-badge { padding: 12px; border-radius: 12px; font-weight: 600; text-align: center; margin-bottom: 25px; font-size: 15px; }
        .waiting { background: #f5f5f7; color: #86868b; }
        .pending_payment { background: #eaf2ff; color: var(--primary); }
        .approved { background: #e8f5e9; color: var(--success); }

        .profile-card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .info-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }

        .active-card { border: 1px solid #c6e1c6; border-radius: 16px; padding: 25px; background: #f9fff9; margin-top: 10px; }
        code { display: block; background: #1d1d1f; color: #fff; padding: 12px; border-radius: 10px; word-break: break-all; font-size: 12px; margin: 10px 0; cursor: pointer; }

        .action-btn { background: var(--white); border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; transition: 0.2s; text-decoration: none; }
        .action-btn:hover { background: var(--primary); color: white; }
        
        /* КНОПКА СКАЧИВАНИЯ */
        .download-btn { background: var(--success); color: white !important; border: none; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 5px; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; transition: 0.2s; }
        .download-btn:hover { opacity: 0.9; }

        .btn-logout { width: 100%; background: none; color: #ff3b30; border: none; padding: 15px; cursor: pointer; font-weight: 600; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2 id="welcomeTitle">Личный кабинет</h2>

    <div id="globalNotice" class="global-notice">
        <div id="noticeText" style="font-size: 14px; color: #856404;"></div>
    </div>

    <div class="profile-card">
        <span class="info-label">Ваши данные</span>
        <div id="clientFullName" style="font-weight: 700; font-size: 18px;">Загрузка...</div>
        <div id="clientPhone" style="font-size: 14px; color: var(--text-secondary);"></div>
    </div>

    <div id="statusDiv" class="status-badge waiting">Синхронизация...</div>

    <div id="activeSection" style="display:none;" class="active-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; font-size: 18px; color: var(--success);"><i class="fas fa-check-circle"></i> Подписка активна</h3>
            <div id="manualBtnContainer"></div>
        </div>
        
        <div id="playlistContainer" style="margin-top: 15px;"></div>
        
        <div style="text-align: right; margin-top: 15px; font-size: 13px;">
            <span class="info-label">Действует до:</span> <strong id="expDate"></strong>
        </div>
    </div>

    <button class="btn-logout" onclick="logout()">Выйти</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAutk3dhPPtonZJ_osnwqqm1bm4Q2de4qI",
        authDomain: "mytv-service-a212c.firebaseapp.com",
        projectId: "mytv-service-a212c",
        appId: "1:297453631537:web:90e836440825b23a173d10"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentData = {};
    let globalBroadcastMessage = "";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    currentData = docSnap.data();
                    renderUI(currentData);
                    updateGlobalNotice();
                }
            });

            onSnapshot(doc(db, "settings", "broadcast"), (snap) => {
                globalBroadcastMessage = (snap.exists() && snap.data().message) ? snap.data().message : "";
                updateGlobalNotice();
            });
        } else {
            window.location.href = 'login.html';
        }
    });

    function updateGlobalNotice() {
        const box = document.getElementById('globalNotice');
        const txt = document.getElementById('noticeText');
        
        const pMsg = (currentData && currentData.comment) ? currentData.comment.trim() : "";
        const bMsg = globalBroadcastMessage ? globalBroadcastMessage.trim() : "";
        const finalMsg = pMsg !== "" ? pMsg : bMsg;

        if (finalMsg !== "") {
            box.style.display = 'block';
            txt.innerText = finalMsg;
        } else {
            box.style.display = 'none';
            txt.innerText = "";
        }
    }

    function renderUI(data) {
        document.getElementById('clientFullName').innerText = `${data.fname || ""} ${data.lname || ""}`;
        document.getElementById('clientPhone').innerText = `📞 ${data.phone || "---"}`;

        const sDiv = document.getElementById('statusDiv');
        const aSec = document.getElementById('activeSection');
        
        if (data.status === 'approved') {
            sDiv.style.display = 'none';
            aSec.style.display = 'block';
            document.getElementById('expDate').innerText = data.expiry || '---';

            const playlistContainer = document.getElementById('playlistContainer');
            playlistContainer.innerHTML = '';
            if (data.playlist) {
                const items = data.playlist.split('|');
                items.forEach((item, index) => {
                    const parts = item.split(':');
                    let name = "Плейлист " + (index + 1);
                    let url = item.trim();
                    if (parts.length > 1) {
                        name = parts[0].trim();
                        url = parts.slice(1).join(':').trim();
                    }
                    playlistContainer.innerHTML += `
                        <div style="margin-bottom: 15px; background: rgba(0,0,0,0.03); padding: 12px; border-radius: 12px;">
                            <span class="info-label" style="color: var(--primary);">${name}:</span>
                            <code onclick="copyToClipboard('${url}')">${url}</code>
                            <a href="${url}" target="_blank" class="download-btn">
                                <i class="fas fa-file-download"></i> СКАЧАТЬ ФАЙЛ
                            </a>
                        </div>
                    `;
                });
            }

            const manualCont = document.getElementById('manualBtnContainer');
            manualCont.innerHTML = data.manual ? `<a href="${data.manual}" target="_blank" class="action-btn" style="margin:0; padding: 5px 12px; background: var(--success); border:none; color:white;"><i class="fas fa-book"></i> Инструкция</a>` : '';
        } else {
            sDiv.style.display = 'block';
            aSec.style.display = 'none';
            sDiv.innerText = data.status === 'pending_payment' ? "💳 ОЖИДАНИЕ ОПЛАТЫ" : "⏳ НА ПРОВЕРКЕ";
        }
    }

    window.copyToClipboard = (text) => {
        navigator.clipboard.writeText(text).then(() => alert("Ссылка скопирована"));
    };

    window.logout = () => signOut(auth).then(() => window.location.href = 'login.html');
</script>
</body>
</html>
