<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой кабинет - IDA TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007aff;
            --text-main: #1d1d1f;
            --text-secondary: #6e6e73;
            --bg-body: #f5f7f9;
            --white: #ffffff;
            --border-color: #d2d2d7;
            --success: #2e7d32;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-body); padding: 20px; display: flex; justify-content: center; color: var(--text-main); }
        .container { max-width: 600px; width: 100%; background: var(--white); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        h2 { text-align: center; font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px; }
        
        .global-notice { display: none; background: #fff9c4; border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 1px solid #ffe58f; animation: fadeIn 0.5s ease; }
        .notice-title { font-weight: 700; color: #856404; margin-bottom: 4px; font-size: 14px; text-transform: uppercase; }

        .status-badge { padding: 12px 20px; border-radius: 12px; font-weight: 600; text-align: center; margin-bottom: 30px; font-size: 15px; }
        .waiting { background: #f5f5f7; color: #86868b; }
        .pending_payment { background: #eaf2ff; color: var(--primary); }
        .approved { background: #e8f5e9; color: var(--success); }

        /* ПРОФИЛЬ */
        .profile-card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .info-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; display: block; margin-bottom: 4px; }
        .info-value { font-size: 15px; font-weight: 500; line-height: 1.4; }

        /* ИНВОЙС */
        .invoice-card { border: 1px solid var(--border-color); border-radius: 16px; margin-top: 20px; background: var(--white); overflow: hidden; }
        .invoice-header { background: #fbfbfd; border-bottom: 1px solid var(--border-color); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .invoice-header h3 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
        .invoice-logo { font-weight: 800; font-size: 18px; color: var(--primary); }
        .invoice-body { padding: 25px; }
        .bank-details { background: #f5f5f7; border-radius: 12px; padding: 20px; }
        .iban-code { font-family: "SF Mono", "Menlo", monospace; font-size: 17px; font-weight: 700; color: var(--primary); display: block; margin: 8px 0; }
        .ref-tag { color: var(--text-main); font-weight: 700; background: #fff; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-color); }

        /* ПЛЕЙЛИСТ */
        .active-card { border: 1px solid #c6e1c6; border-radius: 16px; padding: 30px; background: #f9fff9; margin-top: 20px; }
        code { display: block; background: #1d1d1f; color: #fff; padding: 16px; border-radius: 12px; word-break: break-all; font-size: 13px; line-height: 1.6; margin: 15px 0; }

        /* КНОПКИ */
        .action-btn { background: var(--white); border: 1px solid var(--primary); color: var(--primary); padding: 10px 15px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px; margin-top: 10px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-btn:hover { background: var(--primary); color: white; }
        
        .edit-form { display: none; background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-top: 15px; }
        .edit-form input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border-color); box-sizing: border-box; }

        .support-card { border: 1px solid var(--primary); border-radius: 16px; padding: 25px; background: #f0f7ff; margin-top: 20px; }
        .support-textarea { width: 100%; height: 80px; border-radius: 12px; border: 1px solid var(--border-color); padding: 12px; font-family: inherit; font-size: 14px; resize: none; box-sizing: border-box; margin: 10px 0; }
        
        .btn-send { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-logout { width: 100%; background: none; color: #ff3b30; border: none; padding: 15px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2 id="welcomeTitle">Личный кабинет</h2>

    <div id="globalNotice" class="global-notice">
        <div class="notice-title">Сообщение</div>
        <div id="noticeText"></div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div class="profile-card">
        <span class="info-label">Ваш профиль</span>
        <div id="displayProfile">
            <div class="info-value"><strong id="clientFullName"></strong></div>
            <div class="info-value" id="clientPhone"></div>
            <div class="info-value" id="clientEmail"></div>
            <div class="info-value" id="clientAddressDisplay" style="font-size: 13px; color: var(--text-secondary);"></div>
        </div>
        
        <button class="action-btn" onclick="toggleEditForm()"><i class="fas fa-user-edit"></i> Изменить данные</button>
        
        <div id="editForm" class="edit-form">
            <input type="text" id="editPhone" placeholder="Телефон">
            <input type="email" id="editEmail" placeholder="Email">
            <input type="text" id="editCity" placeholder="Город">
            <input type="text" id="editAddress" placeholder="Адрес">
            <button class="btn-send" onclick="updateUserData()">💾 Сохранить данные</button>
        </div>
    </div>

    <div id="statusDiv" class="status-badge waiting">Загрузка...</div>

    <!-- БЛОК АКТИВНОГО СЕРВИСА -->
    <div id="activeSection" style="display:none;" class="active-card">
        <h3 style="color: #1a1a1a; margin: 0; font-size: 20px;">Подписка активна</h3>
        <p class="info-label">Ваш плейлист</p>
        <code id="playlistUrl"></code>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="action-btn" onclick="requestPlaylistUpdate()">
                <i class="fas fa-sync-alt"></i> Плейлист
            </button>
            <button class="action-btn" onclick="requestServerUpdate()">
                <i class="fas fa-server"></i> Сервер
            </button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e1eee1;">
            <span class="info-label" style="margin: 0;">До:</span>
            <span style="font-weight: 700; color: #2e7d32;" id="expDate"></span>
        </div>
    </div>

    <!-- ОБРАТНАЯ СВЯЗЬ -->
    <div id="supportBox" class="support-card">
        <div id="supportForm">
            <h3 style="color: var(--primary); margin: 0; font-size: 18px;">Написать поддержку</h3>
            <textarea id="supportText" class="support-textarea" placeholder="Сообщение..."></textarea>
            <button id="supportBtn" class="btn-send" onclick="sendToTelegram('MESSAGE')">🚀 Отправить сообщение</button>
        </div>
        <div id="supportSuccess" style="display: none; text-align: center;">
            <i class="fas fa-check-circle" style="font-size: 30px; color: var(--success);"></i>
            <p>Отправлено! <br> <strong>Info IDA TV</strong></p>
            <button onclick="resetSupport()" style="border:none; background:none; color:var(--primary); cursor:pointer;">Написать еще</button>
        </div>
    </div>

    <button class="btn-logout" onclick="logout()">Выйти</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updateEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAutk3dhPPtonZJ_osnwqqm1bm4Q2de4qI",
        authDomain: "mytv-service-a212c.firebaseapp.com",
        projectId: "mytv-service-a212c",
        appId: "1:297453631537:web:90e836440825b23a173d10"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentData = {};

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    currentData = docSnap.data();
                    renderUI(currentData);
                }
            });
        } else { window.location.href = 'login.html'; }
    });

    function renderUI(data) {
        document.getElementById('clientFullName').innerText = `${data.fname || ""} ${data.lname || ""}`;
        document.getElementById('clientPhone').innerText = `📞 ${data.phone || "---"}`;
        document.getElementById('clientEmail').innerText = `✉️ ${data.email || ""}`;
        document.getElementById('clientAddressDisplay').innerText = `📍 ${data.city || ""}, ${data.address || ""}`;

        // Заполнение полей формы
        document.getElementById('editPhone').value = data.phone || "";
        document.getElementById('editEmail').value = data.email || "";
        document.getElementById('editCity').value = data.city || "";
        document.getElementById('editAddress').value = data.address || "";

        const sDiv = document.getElementById('statusDiv');
        const aSec = document.getElementById('activeSection');
        
        if (data.status === 'approved') {
            sDiv.style.display = 'none';
            aSec.style.display = 'block';
            document.getElementById('playlistUrl').innerText = data.playlist || '---';
            document.getElementById('expDate').innerText = data.expiry || '---';
        } else {
            sDiv.style.display = 'block';
            aSec.style.display = 'none';
            sDiv.innerText = data.status === 'waiting' ? "На рассмотрении" : "Ожидание оплаты";
        }

        const noticeBox = document.getElementById('globalNotice');
        if (data.comment) {
            noticeBox.style.display = 'block';
            document.getElementById('noticeText').innerText = data.comment;
        } else { noticeBox.style.display = 'none'; }
    }

    window.toggleEditForm = () => {
        const f = document.getElementById('editForm');
        f.style.display = f.style.display === 'block' ? 'none' : 'block';
    };

    window.updateUserData = async () => {
        const user = auth.currentUser;
        const upData = {
            phone: document.getElementById('editPhone').value,
            email: document.getElementById('editEmail').value,
            city: document.getElementById('editCity').value,
            address: document.getElementById('editAddress').value
        };

        try {
            if (upData.email !== user.email) await updateEmail(user, upData.email);
            await updateDoc(doc(db, "users", user.uid), upData);
            alert("Данные обновлены!");
            toggleEditForm();
            sendToTelegram('UPDATE_PROFILE', 'Клиент обновил данные своего профиля.');
        } catch (e) { alert("Ошибка: " + e.message); }
    };

    // РАЗДЕЛЬНЫЕ КНОПКИ
    window.requestPlaylistUpdate = () => {
        if(confirm("Запросить обновление ПЛЕЙЛИСТА?")) {
            sendToTelegram('🔄 ОБНОВИТЬ ПЛЕЙЛИСТ', 'Прошу обновить мой файл плейлиста.');
        }
    };

    window.requestServerUpdate = () => {
        if(confirm("Запросить смену СЕРВЕРА?")) {
            sendToTelegram('🖥 СМЕНИТЬ СЕРВЕР', 'Прошу сменить сервер вещания на другой.');
        }
    };

    window.sendToTelegram = async (type, msg) => {
        const botToken = "8544750089:AAHswx71xxvAMp4RyFELZuOY0Vyr9Ywds8A";
        const chatId = "1084236547";
        
        let text = (type === 'MESSAGE') ? document.getElementById('supportText').value : msg;
        if (!text) return;

        const info = `🆔 ТИП: ${type}\n👤 Имя: ${currentData.fname} ${currentData.lname}\n📞 Тел: ${currentData.phone}\n📍 Адрес: ${currentData.city}, ${currentData.address}\n\n💬 Текст: ${text}`;

        try {
            const res = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: info })
            });
            if (res.ok && type === 'MESSAGE') {
                document.getElementById('supportForm').style.display = 'none';
                document.getElementById('supportSuccess').style.display = 'block';
            } else if (res.ok) {
                alert("Запрос отправлен!");
            }
        } catch (e) { console.error(e); }
    };

    window.resetSupport = () => {
        document.getElementById('supportText').value = "";
        document.getElementById('supportForm').style.display = 'block';
        document.getElementById('supportSuccess').style.display = 'none';
    };

    window.logout = () => signOut(auth).then(() => window.location.href = 'login.html');
</script>
</body>
</html>
