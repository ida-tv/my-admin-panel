<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой кабинет - IDA TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007aff; --bg-body: #f5f7f9; --white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-body); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--white); padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        /* Блок уведомлений - по умолчанию скрыт */
        .global-notice { display: none; background: #fff9c4; border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid #ffe58f; }
        
        .profile-card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #d2d2d7; margin-bottom: 20px; }
        .info-label { font-size: 11px; color: #6e6e73; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        .active-card { border: 1px solid #c6e1c6; border-radius: 16px; padding: 25px; background: #f9fff9; }
        code { display: block; background: #1d1d1f; color: #fff; padding: 12px; border-radius: 10px; word-break: break-all; margin: 10px 0; }
        .action-btn { background: var(--white); border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; display: block; text-align: center; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Личный кабинет</h2>

    <!-- Окно сообщения -->
    <div id="globalNotice" class="global-notice">
        <div id="noticeText" style="font-size: 14px; color: #856404;"></div>
    </div>

    <div class="profile-card">
        <span class="info-label">Ваши данные</span>
        <div id="clientName" style="font-weight: 700; font-size: 18px;">Загрузка...</div>
        <div id="clientPhone" style="font-size: 14px; color: #6e6e73;"></div>
    </div>

    <div id="activeSection" style="display:none;" class="active-card">
        <h3 style="color: #2e7d32;">Подписка активна</h3>
        <div id="playlistContainer"></div>
    </div>

    <button onclick="logout()" style="width:100%; margin-top:20px; color:red; background:none; border:none; cursor:pointer;">Выйти</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAutk3dhPPtonZJ_osnwqqm1bm4Q2de4qI",
        authDomain: "mytv-service-a212c.firebaseapp.com",
        projectId: "mytv-service-a212c",
        appId: "1:297453631537:web:90e836440825b23a173d10"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userData = {};
    let broadcastMsg = "";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Слушаем данные пользователя
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                userData = snap.exists() ? snap.data() : {};
                renderPage();
            });

            // Слушаем рассылку
            onSnapshot(doc(db, "settings", "broadcast"), (snap) => {
                broadcastMsg = (snap.exists() && snap.data().message) ? snap.data().message : "";
                renderPage();
            });
        } else {
            window.location.href = 'login.html';
        }
    });

    function renderPage() {
        // 1. Отображение профиля
        document.getElementById('clientName').innerText = (userData.fname || "") + " " + (userData.lname || "");
        document.getElementById('clientPhone').innerText = userData.phone || "";

        // 2. ЖЕСТКАЯ ПРОВЕРКА СООБЩЕНИЙ
        const box = document.getElementById('globalNotice');
        const txt = document.getElementById('noticeText');
        
        const personal = (userData.comment || "").trim();
        const global = (broadcastMsg || "").trim();
        const finalMsg = personal !== "" ? personal : global;

        if (finalMsg === "" || finalMsg === "undefined") {
            box.style.setProperty("display", "none", "important");
            txt.innerText = "";
        } else {
            box.style.display = 'block';
            txt.innerText = finalMsg;
        }

        // 3. Статус подписки
        if (userData.status === 'approved') {
            document.getElementById('activeSection').style.display = 'block';
            const cont = document.getElementById('playlistContainer');
            cont.innerHTML = '';
            if (userData.playlist) {
                userData.playlist.split('|').forEach(item => {
                    cont.innerHTML += `<code>${item}</code>`;
                });
            }
        }
    }

    window.logout = () => signOut(auth).then(() => window.location.href = 'login.html');
</script>
</body>
</html>
