<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой кабинет - IDA TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007aff;
            --bg-body: #f5f7f9;
            --white: #ffffff;
            --success: #2e7d32;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-body); padding: 20px; display: flex; justify-content: center; color: #1d1d1f; }
        .container { max-width: 600px; width: 100%; background: var(--white); padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        /* Умное уведомление */
        #globalNotice { display: none; background: #fff9c4; border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid #ffe58f; animation: fadeIn 0.3s ease; }
        
        .profile-card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #d2d2d7; margin-bottom: 20px; }
        .info-label { font-size: 11px; color: #6e6e73; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        
        .status-badge { padding: 12px; border-radius: 12px; font-weight: 600; text-align: center; margin-bottom: 20px; }
        .active-card { border: 1px solid #c6e1c6; border-radius: 16px; padding: 20px; background: #f9fff9; display: none; }
        
        code { display: block; background: #1d1d1f; color: #fff; padding: 12px; border-radius: 10px; word-break: break-all; font-size: 13px; margin: 10px 0; cursor: pointer; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; text-decoration: none; display: inline-block; text-align: center; }
        .btn-download { background: var(--success); margin-top: 5px; font-size: 13px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">Личный кабинет</h2>

    <!-- Блок уведомлений -->
    <div id="globalNotice">
        <div id="noticeText" style="font-size: 14px; color: #856404; line-height: 1.4;"></div>
    </div>

    <!-- Данные профиля -->
    <div class="profile-card">
        <span class="info-label">Ваш профиль</span>
        <div id="uiName" style="font-weight: 700; font-size: 18px;">Загрузка...</div>
        <div id="uiPhone" style="font-size: 14px; color: #6e6e73;"></div>
        <div id="uiAddress" style="font-size: 13px; color: #6e6e73; margin-top: 5px;"></div>
    </div>

    <div id="uiStatus" class="status-badge" style="background: #eee;">Синхронизация...</div>

    <!-- Активный кабинет -->
    <div id="uiActiveBox" class="active-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; color: var(--success);"><i class="fas fa-check-circle"></i> Подписка активна</h3>
            <div id="uiManual"></div>
        </div>
        <div id="uiPlaylists" style="margin-top: 15px;"></div>
        <p style="text-align: right; font-size: 12px; color: #6e6e73;">До: <strong id="uiExpiry"></strong></p>
    </div>

    <button onclick="logout()" style="width:100%; margin-top:30px; background:none; border:none; color:red; font-weight:600; cursor:pointer;">Выйти из аккаунта</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAutk3dhPPtonZJ_osnwqqm1bm4Q2de4qI",
        authDomain: "mytv-service-a212c.firebaseapp.com",
        projectId: "mytv-service-a212c",
        appId: "1:297453631537:web:90e836440825b23a173d10"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let clientData = null;
    let globalMsg = "";

    // Главный слушатель авторизации
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // 1. Слушаем данные пользователя
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                clientData = snap.exists() ? snap.data() : {};
                updateInterface();
            });

            // 2. Слушаем общую рассылку
            onSnapshot(doc(db, "settings", "broadcast"), (snap) => {
                globalMsg = (snap.exists() && snap.data().message) ? snap.data().message : "";
                updateInterface();
            });
        } else {
            window.location.href = 'login.html';
        }
    });

    // ЕДИНАЯ ФУНКЦИЯ ОБНОВЛЕНИЯ ВСЕГО ЭКРАНА
    function updateInterface() {
        if (!clientData) return;

        // Обновляем текст профиля
        document.getElementById('uiName').innerText = `${clientData.fname || ""} ${clientData.lname || ""}`;
        document.getElementById('uiPhone').innerText = `📞 ${clientData.phone || "---"}`;
        document.getElementById('uiAddress').innerText = `📍 ${clientData.city || ""}, ${clientData.address || ""}`;

        // ЛОГИКА УВЕДОМЛЕНИЙ (ЖЕСТКОЕ СКРЫТИЕ)
        const noticeBox = document.getElementById('globalNotice');
        const noticeTxt = document.getElementById('noticeText');
        
        const pMsg = (clientData.comment || "").trim(); // Личное
        const gMsg = (globalMsg || "").trim();         // Общее
        const finalMsg = pMsg !== "" ? pMsg : gMsg;

        if (finalMsg === "" || finalMsg === "undefined") {
            noticeBox.style.display = "none";
            noticeTxt.innerHTML = "";
        } else {
            noticeBox.style.display = "block";
            noticeTxt.innerText = finalMsg;
        }

        // ЛОГИКА СТАТУСА И ПЛЕЙЛИСТОВ
        const statusDiv = document.getElementById('uiStatus');
        const activeBox = document.getElementById('uiActiveBox');
        
        if (clientData.status === 'approved') {
            statusDiv.style.display = "none";
            activeBox.style.display = "block";
            document.getElementById('uiExpiry').innerText = clientData.expiry || '---';

            // Отрисовка плейлистов
            const listDiv = document.getElementById('uiPlaylists');
            listDiv.innerHTML = "";
            if (clientData.playlist) {
                clientData.playlist.split('|').forEach((item, i) => {
                    const parts = item.split(':');
                    const name = parts.length > 1 ? parts[0].trim() : "Плейлист " + (i + 1);
                    const url = parts.length > 1 ? parts.slice(1).join(':').trim() : item.trim();
                    
                    listDiv.innerHTML += `
                        <div style="margin-bottom:15px; background:#f0f0f0; padding:10px; border-radius:12px;">
                            <span class="info-label">${name}</span>
                            <code onclick="copyToClipboard('${url}')">${url}</code>
                            <a href="${url}" target="_blank" class="btn-main btn-download">
                                <i class="fas fa-external-link-alt"></i> Открыть / Скачать файл
                            </a>
                        </div>`;
                });
            }

            // Кнопка инструкции
            document.getElementById('uiManual').innerHTML = clientData.manual ? 
                `<a href="${clientData.manual}" target="_blank" style="font-size:12px; color:var(--primary); font-weight:700;">Инструкция</a>` : "";

        } else {
            activeBox.style.display = "none";
            statusDiv.style.display = "block";
            statusDiv.innerText = clientData.status === 'pending_payment' ? "💳 ОЖИДАНИЕ ОПЛАТЫ" : "⏳ НА ПРОВЕРКЕ";
            statusDiv.style.background = clientData.status === 'pending_payment' ? "#eaf2ff" : "#f5f5f7";
            statusDiv.style.color = clientData.status === 'pending_payment' ? "var(--primary)" : "#86868b";
        }
    }

    window.copyToClipboard = (str) => {
        navigator.clipboard.writeText(str).then(() => alert("Ссылка скопирована"));
    };

    window.logout = () => signOut(auth).then(() => window.location.href = 'login.html');
</script>
</body>
</html>
